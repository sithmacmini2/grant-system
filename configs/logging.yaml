version: 1.0
description: Logging configuration for Grant Intelligence Workflow System

logging:
  version: 1
  disable_existing_loggers: false
  
  formatters:
    standard:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
    detailed:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
    json:
      class: pythonjsonlogger.jsonlogger.JsonFormatter
      format: '%(asctime)s %(name)s %(levelname)s %(message)s'
  
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
      stream: ext://sys.stdout
    
    file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: detailed
      filename: /home/sithmm2_admin/grants-system/logs/system.log
      maxBytes: 10485760
      backupCount: 5
      encoding: utf8
    
    error_file:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: detailed
      filename: /home/sithmm2_admin/grants-system/logs/errors.log
      maxBytes: 10485760
      backupCount: 5
      encoding: utf8
    
    weekly_alerts:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: standard
      filename: /home/sithmm2_admin/grants-system/logs/weekly-alerts.log
      maxBytes: 10485760
      backupCount: 12
    
    monthly_research:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: standard
      filename: /home/sithmm2_admin/grants-system/logs/monthly-research.log
      maxBytes: 10485760
      backupCount: 12
    
    quarterly_reports:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: standard
      filename: /home/sithmm2_admin/grants-system/logs/quarterly-reports.log
      maxBytes: 10485760
      backupCount: 4

  loggers:
    grants_system:
      level: DEBUG
      handlers: [console, file, error_file]
      propagate: false
    
    enrich_grants:
      level: DEBUG
      handlers: [console, file]
      propagate: false
    
    cerebro:
      level: DEBUG
      handlers: [console, file]
      propagate: false
    
    telegram:
      level: INFO
      handlers: [console, file]
      propagate: false

  root:
    level: INFO
    handlers: [console, file]